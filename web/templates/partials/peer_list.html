{{define "peer_list.html"}}
{{if .Peers}}
<table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Allowed IPs</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Public Key</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
        {{range .Peers}}
        <tr>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{.Name}}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.AllowedIPs}}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono truncate max-w-xs">{{.PublicKey}}</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<p class="text-gray-500 text-center py-4">No peers configured yet.</p>
{{end}}
{{end}}
